<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MovieDB</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="panel left">
      <h1>MOVIE DB</h1>
      <div class="collection-count">
        <span id="totalMovies">0</span>
        <span>movies in collection</span>
      </div>
      <form id="addForm" class="add-box">
        <label for="titles">Add movie titles</label>
        <textarea id="titles" rows="7" placeholder="One title per line"></textarea>
        <div class="row">
          <button type="submit">Add movies</button>
        </div>
        <p id="status" class="status"></p>
      </form>
      <label for="search">Search collection</label>
      <input id="search" type="search" placeholder="Search any field">
      <div class="search-fields">
        <div class="field-toolbar">
          <span>Search fields</span>
          <button id="selectAllFields" type="button">All Fields</button>
          <button id="clearFields" type="button">Clear</button>
        </div>
        <div id="fieldList" class="field-list"></div>
      </div>
      <p class="credit-box">The Swingin' on a Star MovieDB was created by Codex and Randy Abernethy (but mostly Codex).</p>
    </section>

    <div class="resizer" data-resizer="left" role="separator" aria-orientation="vertical" aria-label="Resize search column"></div>

    <section class="panel middle">
      <div class="results-header">
        <h2>Results</h2>
        <span id="resultCount" class="result-count"></span>
      </div>
      <div class="sort-row">
        <label for="sortField">Sort by</label>
        <select id="sortField"></select>
        <button id="sortDirection" type="button" aria-label="Toggle sort direction">A-Z</button>
        <div class="sort-actions">
          <div class="article-options">
            <label id="ignoreLeadingTheLabel" class="sort-checkbox" for="ignoreLeadingThe">
              <input id="ignoreLeadingThe" type="checkbox">
              <span>ignore leading &quot;the&quot;</span>
            </label>
            <label id="ignoreLeadingALabel" class="sort-checkbox" for="ignoreLeadingA">
              <input id="ignoreLeadingA" type="checkbox">
              <span>ignore leading &quot;a&quot;</span>
            </label>
          </div>
          <button id="downloadList" type="button">download list</button>
        </div>
      </div>
      <div id="results" class="results" tabindex="0" aria-label="Movie results"></div>
    </section>

    <div class="resizer" data-resizer="middle" role="separator" aria-orientation="vertical" aria-label="Resize results column"></div>

    <section class="panel detail">
      <div id="empty" class="empty">
        <h2>Your movie collection</h2>
        <p>Add titles or search your collection to open a movie record.</p>
        <button id="emptyNewButton" type="button">New</button>
      </div>
      <form id="movieForm" class="movie-form hidden">
        <div class="hero">
          <div class="cover-editor">
            <div id="posterTarget" class="poster-target" tabindex="0" contenteditable="true" spellcheck="false" aria-label="Movie cover art. Drop or paste an image here.">
              <img id="poster" alt="">
            </div>
            <div class="cover-actions">
              <label class="cover-button cover-upload">
                <span>Change Cover Art</span>
                <input id="coverArt" type="file" accept="image/*">
              </label>
              <button id="deleteCoverArt" type="button" class="cover-button cover-delete">Delete Cover Art</button>
            </div>
            <p id="coverStatus" class="cover-status" aria-live="polite"></p>
          </div>
          <div>
            <input id="title" class="title-input" placeholder="Title">
            <div class="row">
              <select id="movieFormat">
                <option>DVD</option>
                <option>Blu-ray</option>
                <option>Digital</option>
              </select>
              <input id="releaseDate" placeholder="Release date">
              <input id="rating" placeholder="MPA Rating" aria-label="MPA Rating">
              <select id="myRating" aria-label="MyRating">
                <option value="">MyRating</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </div>
          </div>
        </div>

        <div class="grid">
          <label>Genre<input id="genre" placeholder="Drama, Comedy"></label>
          <label>Studio<input id="studio" placeholder="Studio"></label>
          <label>Director<input id="directors" placeholder="Director"></label>
          <label>Producer<input id="producers" placeholder="Producer"></label>
          <label>Cast<textarea id="cast" rows="3"></textarea></label>
          <label>Runtime<input id="runtime" placeholder="Runtime"></label>
          <label>Location<input id="location" placeholder="Binder, shelf, box, room"></label>
          <label>Source URL<input id="sourceUrl" placeholder="https://"></label>
          <label>Sort Title<input id="sortTitle" placeholder="Optional title used for sorting"></label>
          <label class="wide">Synopsis<textarea id="synopsis" rows="6"></textarea></label>
          <label class="wide">Notes<textarea id="notes" rows="5"></textarea></label>
        </div>

        <div class="actions">
          <button id="newButton" type="button">New</button>
          <button type="submit">Save changes</button>
          <button id="refreshButton" type="button">Update from source</button>
          <button id="deleteButton" type="button" class="danger">Delete</button>
        </div>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
